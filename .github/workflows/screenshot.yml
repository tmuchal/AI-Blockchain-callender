name: Update Preview Screenshot

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

permissions:
  contents: write

jobs:
  screenshot:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Take screenshot
        run: |
          node -e "
          const { chromium } = require('@playwright/test');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            await page.goto('https://tmuchal.github.io/AI-Blockchain-callender/', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(2000);
            await page.screenshot({ path: 'public/preview.png' });
            await browser.close();
            console.log('Screenshot taken');
          })();
          "

      - name: Commit screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/preview.png
          git diff --staged --quiet || git commit -m "chore: update preview screenshot [skip ci]"
          git push
